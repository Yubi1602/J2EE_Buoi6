<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{book/layout}"> ```
<head>
    <meta charset="UTF-8">
    <title>Quản lý Thư viện</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
        .table thead { background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        .btn-action { padding: 5px 10px; font-size: 0.85rem; border-radius: 6px; }
        .badge-author { background-color: #e3f2fd; color: #0d47a1; font-weight: 500; padding: 5px 10px; border-radius: 4px; }
        /* Đồng bộ màu sắc với trang chủ */
        .breadcrumb-item a { text-decoration: none; color: #6c757d; }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container mt-4">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/home}"><i class="bi bi-house-door"></i> Trang chủ</a></li>
                <li class="breadcrumb-item active" aria-current="page">Danh sách sách</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="text-primary fw-bold mb-0">
                    <i class="bi bi-bookshelf"></i> QUẢN LÝ THƯ VIỆN
                </h2>
                <small class="text-muted" th:if="${books != null}" th:text="'Tổng cộng: ' + ${books.size()} + ' cuốn sách'"></small>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/home}" class="btn btn-outline-secondary px-3 shadow-sm">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>
                <a th:href="@{/books/add}" class="btn btn-primary shadow-sm px-4">
                    <i class="bi bi-plus-circle-fill me-2"></i>Thêm sách mới
                </a>
            </div>
        </div>

        <div class="card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width: 10%;">ID</th>
                        <th style="width: 40%;">Tiêu đề</th>
                        <th style="width: 25%;">Tác giả</th>
                        <th style="width: 25%;" class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="b : ${books}">
                        <td class="ps-4 fw-bold text-muted" th:text="'#' + ${b.id}"></td>
                        <td th:text="${b.title}" class="fw-semibold"></td>
                        <td>
                            <span class="badge-author">
                                <i class="bi bi-person"></i> [[${b.author}]]
                            </span>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/books/edit/{id}(id=${b.id})}" class="btn btn-outline-warning btn-action">
                                    <i class="bi bi-pencil-square"></i> Sửa
                                </a>
                                <a th:href="@{/books/delete/{id}(id=${b.id})}"
                                   class="btn btn-outline-danger btn-action"
                                   onclick="return confirm('Kha có chắc chắn muốn xóa cuốn sách này?')">
                                    <i class="bi bi-trash3"></i> Xóa
                                </a>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(books)}">
                        <td colspan="4" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox" style="font-size: 2.5rem;"></i>
                            <p class="mt-2">Thư viện trống, hãy thêm sách đầu tiên!</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
